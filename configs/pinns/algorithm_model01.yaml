# 模型01：非线性单摆残差 θ_tt + (g/l) sin θ
dataset_source: algorithm
train_csv: data/raw/algorithm_prediction_data/ode_prediction_data.csv
physics_mode: nonlinear
batch_size: 2048
lr: 0.001
epochs: 50
# 数据项权重大于物理项，并显式约束 θ(t=0)=θ0，避免退化为「恒为零」的假物理解
lambda_data: 10.0
lambda_physics: 0.1
lambda_ic: 5.0
seed: 42
hidden_dim: 128
n_hidden: 3
